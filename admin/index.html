<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenso Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6ef7;
      --accent2: #a78bfa;
      --green: #34d399;
      --amber: #fbbf24;
      --red: #f87171;
      --text: #f0f0f8;
      --text2: #9090b0;
      --text3: #55556a;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .logo-text { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; }
    .logo-badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      background: rgba(124,110,247,0.15); border: 1px solid rgba(124,110,247,0.3);
      border-radius: 100px; color: var(--accent2); letter-spacing: 0.5px;
    }
    #auth-status { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 8px; }
    #auth-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: background 0.3s; }
    #auth-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }

    /* ── Layout ── */
    main { flex: 1; padding: 32px; max-width: 1400px; margin: 0 auto; width: 100%; }

    /* ── Stats row ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px;
    }
    .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 30px; font-weight: 700; letter-spacing: -1px; }
    .stat-value.accent { color: var(--accent2); }
    .stat-value.green { color: var(--green); }
    .stat-value.amber { color: var(--amber); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .search-wrap {
      position: relative; flex: 1; min-width: 220px;
    }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
    #search {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: inherit; font-size: 14px;
      padding: 10px 14px 10px 38px; outline: none; transition: border-color 0.2s;
    }
    #search:focus { border-color: rgba(124,110,247,0.5); }
    #search::placeholder { color: var(--text3); }

    .filter-btn {
      padding: 9px 16px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text2); font-family: inherit;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: rgba(124,110,247,0.4); color: var(--text); }
    .filter-btn.active { background: rgba(124,110,247,0.15); border-color: rgba(124,110,247,0.5); color: var(--accent2); }
    #refresh-btn {
      padding: 9px 16px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text2); font-family: inherit;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    #refresh-btn:hover { border-color: rgba(124,110,247,0.4); color: var(--text); }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); }
    th {
      padding: 13px 20px; text-align: left; font-size: 11px; font-weight: 600;
      color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .user-cell { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
    .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .user-name { font-weight: 500; }
    .user-phone { font-size: 12px; color: var(--text2); margin-top: 2px; letter-spacing: 0.5px; }

    .uid-cell { font-size: 12px; color: var(--text3); font-family: monospace; cursor: pointer; }
    .uid-cell:hover { color: var(--accent2); }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600;
    }
    .badge.beta { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
    .badge.creator { background: rgba(251,191,36,0.15); color: var(--amber); border: 1px solid rgba(251,191,36,0.25); }
    .badge.none { background: rgba(255,255,255,0.04); color: var(--text3); border: 1px solid var(--border); }

    .joined-cell { font-size: 13px; color: var(--text2); }

    .action-btn {
      padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); font-family: inherit;
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .action-btn:hover { background: var(--surface2); color: var(--text); border-color: rgba(124,110,247,0.4); }

    /* ── Empty / loading ── */
    .empty-row td { text-align: center; padding: 60px; color: var(--text3); }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Modal ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 32px; width: 480px; max-width: calc(100vw - 32px);
      animation: fadeIn 0.2s ease;
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .modal-close:hover { background: var(--surface2); color: var(--text); }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 6px; letter-spacing: 0.3px; }
    input[type=text] {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: inherit; font-size: 14px;
      padding: 10px 14px; outline: none; transition: border-color 0.2s;
    }
    input[type=text]:focus { border-color: rgba(124,110,247,0.5); }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
    }
    .toggle-label { font-size: 14px; font-weight: 500; }
    .toggle-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .toggle {
      position: relative; width: 44px; height: 24px; cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px; width: 18px; height: 18px;
      border-radius: 50%; background: white; transition: transform 0.2s; pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .btn-cancel {
      padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); font-family: inherit;
      font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .btn-cancel:hover { background: var(--surface2); color: var(--text); }
    .btn-save {
      padding: 10px 24px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border); border-radius: 100px;
      padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--text);
      z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    #toast.success { border-color: rgba(52,211,153,0.4); color: var(--green); }
    #toast.error { border-color: rgba(248,113,113,0.4); color: var(--red); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💸</div>
    <span class="logo-text">Expenso</span>
    <span class="logo-badge">ADMIN</span>
  </div>
  <div id="auth-status">
    <div id="auth-dot"></div>
    <span id="auth-text">Connecting…</span>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value accent" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Beta Testers</div>
      <div class="stat-value green" id="stat-beta">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Joined This Week</div>
      <div class="stat-value amber" id="stat-week">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active (24h)</div>
      <div class="stat-value" id="stat-active">—</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search by name, phone or UID…" />
    </div>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="beta">Beta Only</button>
    <button class="filter-btn" data-filter="recent">Recent</button>
    <button id="refresh-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>UID</th>
          <th>Status</th>
          <th>Joined</th>
          <th>Last Seen</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="user-table-body">
        <tr class="empty-row"><td colspan="6"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Edit Modal -->
<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit User</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="field">
      <label>Display Name</label>
      <input type="text" id="edit-name" placeholder="Display name" />
    </div>
    <div class="field">
      <label>UPI ID</label>
      <input type="text" id="edit-upi" placeholder="user@bank" />
    </div>
    <div class="field" style="margin-bottom:8px;">
      <label>Access</label>
      <div class="toggle-row" style="margin-bottom:10px;">
        <div>
          <div class="toggle-label">🧪 Beta Tester</div>
          <div class="toggle-desc">Unlocks experimental features</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="edit-beta" />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn-save" id="save-btn">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, collection, getDocs, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAp9g83dmX1-XgNkFPzDVQo2orY9OvuLbQ",
    authDomain: "expenso-e138a.firebaseapp.com",
    projectId: "expenso-e138a",
    storageBucket: "expenso-e138a.firebasestorage.app",
    messagingSenderId: "211875033656",
    appId: "1:211875033656:web:2f8174003c25c7ada5eccd"
  };

  const CREATOR_UID = '605oNyF1miUumLGMgEnaGGD0Lyh2';

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── State ──
  let allUsers = [];
  let currentFilter = 'all';
  let searchQuery = '';
  let editingUid = null;

  // ── DOM ──
  const tbody = document.getElementById('user-table-body');
  const searchEl = document.getElementById('search');
  const modal = document.getElementById('modal');
  const toast = document.getElementById('toast');
  const authDot = document.getElementById('auth-dot');
  const authText = document.getElementById('auth-text');

  // ── Helpers ──
  function formatDate(ms) {
    if (!ms) return '—';
    return new Date(ms).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }
  function timeAgo(ms) {
    if (!ms) return '—';
    const diff = Date.now() - ms;
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    const d = Math.floor(h / 24);
    return `${d}d ago`;
  }
  function initials(name) {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  }
  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => showToast('UID copied!', 'success'));
  }
  function showToast(msg, type='') {
    toast.textContent = msg;
    toast.className = `show ${type}`;
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { toast.className = ''; }, 2400);
  }

  // ── Load users ──
  async function loadUsers() {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6"><div class="spinner"></div></td></tr>`;
    try {
      const snap = await getDocs(collection(db, 'users'));
      allUsers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
      authDot.classList.add('connected');
      authText.textContent = 'Connected';
      updateStats();
      renderTable();
    } catch(e) {
      authText.textContent = 'Error';
      tbody.innerHTML = `<tr class="empty-row"><td colspan="6" style="color:#f87171">Failed to load: ${e.message}</td></tr>`;
    }
  }

  function updateStats() {
    const now = Date.now();
    const weekMs = 7 * 24 * 60 * 60 * 1000;
    const dayMs = 24 * 60 * 60 * 1000;
    document.getElementById('stat-total').textContent = allUsers.length;
    document.getElementById('stat-beta').textContent = allUsers.filter(u => u.isBeta).length;
    document.getElementById('stat-week').textContent = allUsers.filter(u => u.joinedAt && (now - u.joinedAt) < weekMs).length;
    document.getElementById('stat-active').textContent = allUsers.filter(u => u.lastSeen && (now - u.lastSeen) < dayMs).length;
  }

  function getFiltered() {
    let list = allUsers;
    if (currentFilter === 'beta') list = list.filter(u => u.isBeta);
    if (currentFilter === 'recent') {
      const w = 7 * 24 * 60 * 60 * 1000;
      list = list.filter(u => u.joinedAt && (Date.now() - u.joinedAt) < w);
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(u =>
        (u.displayName||'').toLowerCase().includes(q) ||
        (u.phoneNumber||'').includes(q) ||
        u.uid.toLowerCase().includes(q)
      );
    }
    return list;
  }

  function renderTable() {
    const users = getFiltered();
    if (!users.length) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="6">No users found</td></tr>`;
      return;
    }
    tbody.innerHTML = users.map(u => {
      const isCreator = u.uid === CREATOR_UID;
      const badge = isCreator
        ? `<span class="badge creator">👑 Creator</span>`
        : u.isBeta
          ? `<span class="badge beta">🧪 Beta</span>`
          : `<span class="badge none">—</span>`;

      const avatarContent = u.photoURL
        ? `<img src="${u.photoURL}" alt="" onerror="this.style.display='none'" />`
        : initials(u.displayName || u.phoneNumber);

      const shortUid = u.uid.slice(0, 14) + '…';

      return `<tr>
        <td>
          <div class="user-cell">
            <div class="avatar">${avatarContent}</div>
            <div>
              <div class="user-name">${u.displayName || '<span style="color:var(--text3)">No name</span>'}</div>
              <div class="user-phone">${u.phoneNumber || ''}</div>
            </div>
          </div>
        </td>
        <td class="uid-cell" title="Click to copy" onclick="copyUID('${u.uid}')">${shortUid}</td>
        <td>${badge}</td>
        <td class="joined-cell">${formatDate(u.joinedAt)}</td>
        <td class="joined-cell">${timeAgo(u.lastSeen)}</td>
        <td><button class="action-btn" onclick="openEdit('${u.uid}')">Edit</button></td>
      </tr>`;
    }).join('');
  }

  // ── Edit modal ──
  window.openEdit = function(uid) {
    const user = allUsers.find(u => u.uid === uid);
    if (!user) return;
    editingUid = uid;
    document.getElementById('edit-name').value = user.displayName || '';
    document.getElementById('edit-upi').value = user.upiId || '';
    document.getElementById('edit-beta').checked = !!user.isBeta;
    modal.style.display = 'flex';
    document.getElementById('modal-title') && (document.getElementById('modal-title').textContent = user.displayName || 'User');
  };

  window.copyUID = copyToClipboard;

  document.getElementById('modal-close').onclick = () => modal.style.display = 'none';
  document.getElementById('cancel-btn').onclick = () => modal.style.display = 'none';
  modal.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; });

  document.getElementById('save-btn').onclick = async () => {
    if (!editingUid) return;
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const updates = {
        displayName: document.getElementById('edit-name').value.trim(),
        upiId: document.getElementById('edit-upi').value.trim(),
        isBeta: document.getElementById('edit-beta').checked,
      };
      await updateDoc(doc(db, 'users', editingUid), updates);
      // Update local cache
      const idx = allUsers.findIndex(u => u.uid === editingUid);
      if (idx !== -1) allUsers[idx] = { ...allUsers[idx], ...updates };
      updateStats();
      renderTable();
      modal.style.display = 'none';
      showToast('✓ User updated', 'success');
    } catch(e) {
      showToast('Failed: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  };

  // ── Filters & search ──
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderTable();
    });
  });
  searchEl.addEventListener('input', () => {
    searchQuery = searchEl.value;
    renderTable();
  });
  document.getElementById('refresh-btn').onclick = loadUsers;

  // ── Init ──
  loadUsers();
</script>
</body>
</html>
